<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>house</title>
    <script>
      (function(l) {
        if (l.search[1] === 'p') {
          var params = l.search.slice(1).split('&');
          var path = params[0].replace(/^p=/, '').replace(/~and~/g, '&');
          var query = params[1] ? '?' + params[1].replace(/^q=/, '').replace(/~and~/g, '&') : '';
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + '/' + path + query + l.hash
          );
        }
      }(window.location));
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
